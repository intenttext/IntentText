[package]
name = "intenttext"
version = "2.14.2"
edition = "2021"
rust-version = "1.74"
description = "The IntentText (.it) document language — parser, renderer, query engine, trust, workflow executor"
license = "MIT"
repository = "https://github.com/intenttext/intenttext-rs"
keywords = ["document", "parser", "intenttext", "semantic", "format"]
categories = ["parser-implementations", "text-processing"]

[lib]
name = "intenttext"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "intenttext-cli"
path = "src/main.rs"

[features]
default = ["renderer", "query", "validate", "watch", "trust"]
renderer = []
query = []
validate = []
watch = []
trust = ["sha2", "hex"]
executor = []
wasm = ["wasm-bindgen", "js-sys", "serde-wasm-bindgen"]
python = ["pyo3"]
ai_transport = []
full = ["renderer", "query", "validate", "watch", "trust", "executor", "ai_transport"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
once_cell = "1"
thiserror = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "js"] }
regex = "1"
dirs = "5"

# Trust feature
sha2 = { version = "0.10", optional = true }
hex = { version = "0.4", optional = true }

# WASM feature
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }

# Python bindings
pyo3 = { version = "0.21", features = ["extension-module"], optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "parser_bench"
harness = false
