[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "intenttext"
version = "4.0.0"
description = "IntentText for Python — thin client over the canonical TS core (experimental)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = []

[project.urls]
Homepage = "https://github.com/intenttext/IntentText"
Repository = "https://github.com/intenttext/intenttext-python"
Documentation = "https://dotit.uts.qa"

[project.optional-dependencies]
dev = ["pytest", "pytest-cov"]

[tool.pytest.ini_options]
testpaths = ["tests"]
