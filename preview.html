<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntentText Live Preview</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f2f5;
        color: #333;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ──────────────────────────────────────────── */
      .header {
        background: #1a1f2e;
        color: white;
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }

      .header-left h1 {
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      .header-left p {
        font-size: 0.75rem;
        color: #8892a4;
        margin-top: 2px;
      }

      .header-badge {
        font-size: 0.7rem;
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
        border: 1px solid rgba(99, 102, 241, 0.4);
        border-radius: 12px;
        padding: 0.2rem 0.65rem;
        font-weight: 500;
      }

      /* ── Main layout ─────────────────────────────────────── */
      .main-container {
        display: flex;
        flex: 1;
        overflow: hidden;
        gap: 1px;
        background: #d8dce6;
      }

      .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: white;
        min-width: 0;
      }

      /* ── Panel header ────────────────────────────────────── */
      .panel-header {
        padding: 0.55rem 1rem;
        border-bottom: 1px solid #e8ecf0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f8fafc;
        flex-shrink: 0;
      }

      .panel-title {
        font-size: 0.75rem;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .panel-hint {
        font-size: 0.7rem;
        color: #94a3b8;
        margin-top: 2px;
      }

      /* ── Editor ──────────────────────────────────────────── */
      #editor {
        flex: 1;
        border: none;
        padding: 1.25rem 1.5rem;
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Monaco", "Menlo", ui-monospace, monospace;
        font-size: 13.5px;
        line-height: 1.75;
        resize: none;
        outline: none;
        color: #1e293b;
        background: #fafafa;
        tab-size: 2;
      }

      /* ── Stats bar ───────────────────────────────────────── */
      .stats-bar {
        font-size: 0.7rem;
        color: #94a3b8;
        padding: 0.3rem 0.75rem;
        background: #0d1117;
        border-top: 1px solid #1e2738;
        flex-shrink: 0;
        font-family: "Monaco", "Menlo", "Consolas", monospace;
        letter-spacing: 0.2px;
      }

      .stats-bar.has-warnings {
        color: #fbbf24;
      }

      .stats-bar.has-errors {
        color: #f87171;
        background: #1c0808;
        border-top-color: #3d1515;
      }

      /* ── Preview pane ────────────────────────────────────── */
      #preview-pane {
        flex: 1;
        overflow-y: auto;
        background: white;
      }

      /* Override renderer's standalone-document centering inside the pane */
      #preview-pane .intent-document {
        max-width: none;
        padding: 20px 28px;
      }

      /* ── Buttons ─────────────────────────────────────────── */
      .btn {
        padding: 0.35rem 0.75rem;
        border: none;
        border-radius: 5px;
        font-size: 0.78rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        white-space: nowrap;
      }

      .btn-primary { background: #6366f1; color: white; }
      .btn-primary:hover { background: #4f46e5; }

      .btn-secondary { background: #e2e8f0; color: #475569; }
      .btn-secondary:hover { background: #cbd5e1; }

      .btn-group { display: flex; gap: 0.4rem; align-items: center; }

      /* ── Responsive ──────────────────────────────────────── */
      @media (max-width: 768px) {
        body { overflow: auto; }
        .main-container { flex-direction: column; }
        .panel { min-height: 45vh; }
        .header { flex-wrap: wrap; gap: 0.4rem; }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <h1>IntentText Live Preview</h1>
        <p>Type .it syntax on the left — rendered HTML on the right</p>
      </div>
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <span class="header-badge">.it format</span>
      </div>
    </header>

    <main class="main-container">

      <!-- Left: Editor -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Editor (.it)</div>
            <div class="panel-hint">Write IntentText — updates instantly</div>
          </div>
          <div class="btn-group">
            <button id="clear-btn" class="btn btn-secondary">✕ Clear</button>
          </div>
        </div>
        <textarea id="editor" spellcheck="false">title: IntentText *Keyword* Showcase

section: Media & Links

        <div class="stats-bar" id="stats-bar">—</div>
      </div>

      <!-- Right: Preview -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Preview (HTML)</div>
            <div class="panel-hint">Rendered output</div>
          </div>
          <div class="btn-group">
            <button id="copy-btn" class="btn btn-primary">📋 Copy HTML</button>
          </div>
        </div>
        <div id="preview-pane"></div>
      </div>

    </main>

    <script src="intenttext.browser.js"></script>
    <script>
      var editor    = document.getElementById("editor");
      var previewPane = document.getElementById("preview-pane");
      var statsBar  = document.getElementById("stats-bar");

      function render() {
        var text = editor.value;
        try {
          var doc  = IntentText.parseIntentText(text);
          var html = IntentText.renderHTML(doc);
          previewPane.innerHTML = html;

          var count = doc.blocks.length;
          var stats = count + " block" + (count !== 1 ? "s" : "");

          if (doc.diagnostics && doc.diagnostics.length > 0) {
            var errs  = doc.diagnostics.filter(function(d) { return d.severity === "error"; }).length;
            var warns = doc.diagnostics.filter(function(d) { return d.severity === "warning"; }).length;
            if (errs)  stats += " · " + errs  + " error"   + (errs  !== 1 ? "s" : "");
            if (warns) stats += " · " + warns + " warning" + (warns !== 1 ? "s" : "");
            if (errs) {
              statsBar.classList.add("has-errors");
              statsBar.classList.remove("has-warnings");
            } else {
              statsBar.classList.remove("has-errors");
              statsBar.classList.add("has-warnings");
            }
          } else {
            statsBar.classList.remove("has-errors");
            statsBar.classList.remove("has-warnings");
          }
          statsBar.textContent = stats;
        } catch (err) {
          previewPane.innerHTML =
            '<div style="padding:20px;color:#dc2626;font-family:monospace;font-size:13px;">' +
            '<strong>Parse error:</strong> ' + err.message + '</div>';
          statsBar.textContent = "parse error";
          statsBar.classList.add("has-errors");
        }
      }

      document.getElementById("clear-btn").addEventListener("click", function() {
        editor.value = "";
        render();
        editor.focus();
      });

      document.getElementById("copy-btn").addEventListener("click", function() {
        var html = previewPane.innerHTML;
        if (!html) return;
        navigator.clipboard.writeText(html).then(function() {
          var btn = document.getElementById("copy-btn");
          btn.textContent = "✓ Copied!";
          btn.style.background = "#22c55e";
          setTimeout(function() {
            btn.textContent = "📋 Copy HTML";
            btn.style.background = "";
          }, 2000);
        });
      });

      var debounce;
      editor.addEventListener("input", function() {
        clearTimeout(debounce);
        debounce = setTimeout(render, 80);
      });

      render();
    </script>
  </body>
</html>
