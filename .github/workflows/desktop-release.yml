name: Desktop Release

# Builds the Dotit desktop app (apps/desktop, Tauri 2) for macOS + Windows and
# publishes the installers to a GitHub Release.
#
# Trigger by pushing a tag of the form `desktop-vX.Y.Z` that matches the version
# in apps/desktop/package.json — e.g.:
#     git tag desktop-v2.9.0 && git push origin desktop-v2.9.0
# (kept separate from the `v*.*.*` npm-release tags so the two never collide.)
# Can also be run manually via the Actions tab (workflow_dispatch).
#
# CODE SIGNING: builds are currently UNSIGNED. macOS users see a Gatekeeper
# warning (right-click → Open) and Windows users see SmartScreen. To sign +
# notarize later, add the secrets referenced in the commented `env:` block
# below — no other change to this file is required.

on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Verify the tag matches apps/desktop/package.json before spending build minutes.
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        name: Resolve + verify version
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            if [ "${TAG}" != "desktop-v${VERSION}" ]; then
              echo "::error::Tag ${TAG} does not match apps/desktop version desktop-v${VERSION}"
              exit 1
            fi
          fi
          echo "Releasing Dotit desktop v${VERSION}"

  build:
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            # Universal binary → one .dmg runs on both Apple Silicon and Intel.
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo (registry + target)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # The desktop frontend imports the workspace packages from their built
      # dist/, so compile them before tauri-action runs `npm run build`.
      - name: Build workspace deps (core, sign, editor)
        run: pnpm --filter @dotit/core --filter @dotit/sign --filter @dotit/editor build

      - name: Build + release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Signing / notarization (add these GitHub secrets to enable) ──────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: desktop-v${{ needs.guard.outputs.version }}
          releaseName: "Dotit v${{ needs.guard.outputs.version }}"
          releaseBody: |
            Native desktop app for `.it` documents — WYSIWYG editor, workspace search, and trust (seal / sign / verify).

            **Downloads**
            - **macOS** (Apple Silicon + Intel): `.dmg` — unsigned, so on first launch right-click the app → **Open**.
            - **Windows**: `.msi` / `.exe` — unsigned, so click **More info → Run anyway** past SmartScreen.

            See the changelog for what's new in this release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
