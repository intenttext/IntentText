name: Desktop Release

# Builds the Dotit desktop app (apps/desktop, Electron) for macOS +
# Windows and publishes the installers to a GitHub Release.
#
# Trigger by pushing a tag of the form `desktop-vX.Y.Z` that matches the version
# in apps/desktop/package.json — e.g.:
#     git tag desktop-v3.0.0 && git push origin desktop-v3.0.0
# (kept separate from the `v*.*.*` npm-release tags so the two never collide.)
# Can also be run manually via the Actions tab (workflow_dispatch).
#
# CODE SIGNING: builds are currently UNSIGNED. macOS users see a Gatekeeper
# warning (right-click → Open) and Windows users see SmartScreen. To sign +
# notarize later, add the secrets referenced in the commented `env:` block
# below and electron-builder picks them up automatically.

on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Verify the tag matches apps/desktop/package.json before building.
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        name: Resolve + verify version
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            if [ "${TAG}" != "desktop-v${VERSION}" ]; then
              echo "::error::Tag ${TAG} does not match apps/desktop version desktop-v${VERSION}"
              exit 1
            fi
          fi
          echo "Releasing Dotit desktop v${VERSION}"

  build:
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        # Version comes from package.json "packageManager" (pnpm@9.0.0). Do NOT
        # also pass `version:` here — action-setup@v4 errors on a double spec.
        uses: pnpm/action-setup@v4

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # The renderer imports the workspace packages from their built dist/, so
      # compile them before electron-vite bundles the app.
      - name: Build workspace deps (core, sign, editor)
        run: pnpm --filter @dotit/core --filter @dotit/sign --filter @dotit/editor build

      - name: Build + publish desktop app
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Signing / notarization (add these GitHub secrets to enable) ──────
          # macOS: CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          # Windows: CSC_LINK, CSC_KEY_PASSWORD
        run: |
          pnpm exec electron-vite build
          pnpm exec electron-builder --publish always
