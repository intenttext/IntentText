name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # No `version:` here — it conflicts with the root package.json
        # `packageManager: pnpm@9.0.0` ("Multiple versions of pnpm specified").
        # action-setup@v4 reads the pinned version from packageManager.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches @dotit/core version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./packages/core/package.json').version")"
          if [ "${TAG}" != "v${VERSION}" ]; then
            echo "Tag ${TAG} does not match packages/core version v${VERSION}"
            exit 1
          fi

      - name: Build + test + contract gates
        run: pnpm --filter @dotit/core check

      # Diagnostic: which npm account does NPM_TOKEN authenticate as, and can it
      # write @dotit? (The repeated E404-on-PUT is npm masking a permission error.)
      - name: npm auth diagnostic
        run: |
          echo "whoami:"; npm whoami || echo "  (token did not authenticate)"
          echo "access to @dotit/core:"; npm access list collaborators @dotit/core 2>&1 | head -20 || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @dotit/core
        run: pnpm publish --filter @dotit/core --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # SBOM (CycloneDX) for the release — government/enterprise procurement expects
      # a Software Bill of Materials per release. Syft reads the pnpm lockfile.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sbom.cdx.json
