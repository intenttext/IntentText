name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches @dotit/core version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./packages/core/package.json').version")"
          if [ "${TAG}" != "v${VERSION}" ]; then
            echo "Tag ${TAG} does not match packages/core version v${VERSION}"
            exit 1
          fi

      - name: Build + test + contract gates
        run: pnpm --filter @dotit/core check

      - name: Publish @dotit/core
        run: pnpm publish --filter @dotit/core --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
