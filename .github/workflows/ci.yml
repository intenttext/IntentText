name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        # Version comes from package.json "packageManager" — don't double-spec.
        uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install

      # ── Core: build, test, and contract gates ──────────────────────────────
      - name: Build core
        run: pnpm --filter @dotit/core build

      - name: Test core
        run: pnpm --filter @dotit/core test

      # THE MOAT: the byte-preservation invariant — documentToSource(parse(x)) === x
      # for thousands of generated docs, reconcileEdit no-op identity, and a sealed
      # doc surviving a no-op save. A failure here means a sealed .it could silently
      # lose its hash. This is a HARD release blocker; never make it non-blocking.
      - name: Byte-preservation gate (round-trip invariant — release blocker)
        run: pnpm --filter @dotit/core test:byte

      - name: Keyword consistency gate (registry <-> BlockType)
        run: pnpm --filter @dotit/core keywords:check

      - name: Consumer parity gate (registry <-> VSCode grammar)
        run: pnpm --filter @dotit/core parity:check

      - name: Example files clean (no deprecations / unknown keywords)
        run: node scripts/check-examples.mjs

      - name: Emit core package size report
        run: node packages/core/scripts/report-package-size.cjs > core-package-size.json

      - name: Enforce core package size gate
        run: node packages/core/scripts/check-package-size.cjs core-package-size.json

      - name: Enforce core npm pack footprint
        run: node packages/core/scripts/check-pack-footprint.cjs

      # ── Cryptographic trust layer ──────────────────────────────────────────
      - name: Build sign
        run: pnpm --filter @dotit/sign build

      - name: Test sign
        run: pnpm --filter @dotit/sign test

      # ── Supported downstream surface (build only — must compile against core) ─
      - name: Build MCP server
        run: pnpm --filter @dotit/mcp build

      - name: Test MCP server
        run: pnpm --filter @dotit/mcp test

      - name: Build VSCode extension
        run: pnpm --filter intenttext compile

      - name: Build editor app
        run: pnpm --filter intenttext-editor build

      - name: Editor visual round-trip fidelity
        run: pnpm --filter intenttext-editor roundtrip:check

      # Public trust surface — the verification engine must stay correct + injection-safe.
      - name: Test verify portal
        run: pnpm --filter @dotit/verify-portal test

      - name: Upload core package size artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-package-size
          path: core-package-size.json

      # ── Dependency vulnerability scan ───────────────────────────────────────
      # Non-blocking for now: the current high advisories are dev/build-only
      # tooling (transitive esbuild via vite, dev-server-only). Surfaced here so
      # they're visible; tighten to a hard gate once production deps are clean.
      - name: Audit production dependencies (report-only)
        run: pnpm audit --prod --audit-level high || true
