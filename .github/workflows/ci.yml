name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Emit Rust Core Fallback Telemetry
        run: node packages/core/scripts/report-fallback-telemetry.cjs > core-fallback-telemetry.json

      - name: Enforce Rust Theme Fallback Zero
        run: node -e "const fs=require('node:fs');const p='core-fallback-telemetry.json';const raw=fs.readFileSync(p,'utf8');const data=JSON.parse(raw);const t=data.rustCoreFallbackTelemetry||{};const v=Number(t.renderer_theme_fallback_to_ts||0);if(v>0){console.error('renderer_theme_fallback_to_ts must be 0, got '+v);process.exit(1)};console.log('renderer_theme_fallback_to_ts=0 (pass)');"

      - name: Upload Fallback Telemetry Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-fallback-telemetry
          path: core-fallback-telemetry.json

      - name: Emit Core Package Size Report
        run: node packages/core/scripts/report-package-size.cjs > core-package-size.json

      - name: Enforce Core Package Size Gate
        run: node packages/core/scripts/check-package-size.cjs core-package-size.json

      - name: Enforce Core NPM Pack Footprint
        run: node packages/core/scripts/check-pack-footprint.cjs

      - name: Enforce No Parser Runtime Coupling In Core Entrypoints
        run: node packages/core/scripts/check-no-parser-runtime-coupling.cjs

      - name: Upload Core Package Size Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-package-size
          path: core-package-size.json
