version: 2
updates:
  # npm / pnpm workspace — grouped weekly PRs to keep the surface small.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "esbuild"
          - "tsx"
          - "typescript"
          - "vitest"
          - "@types/*"
      production:
        dependency-type: production

  # GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
