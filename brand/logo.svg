<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- dotit — ".it" mark. The two blue dots (period + i-tittle) echo the colon
       that defines the format's `keyword: value` grammar. -->
  <rect width="512" height="512" rx="96" fill="#0F172A"/>
  <!-- period (the "dot" of dotit) -->
  <circle cx="132" cy="344" r="30" fill="#3B82F6"/>
  <!-- i -->
  <rect x="204" y="216" width="36" height="158" rx="18" fill="#F8FAFC"/>
  <circle cx="222" cy="158" r="24" fill="#3B82F6"/>
  <!-- t -->
  <rect x="304" y="128" width="36" height="246" rx="18" fill="#F8FAFC"/>
  <rect x="268" y="216" width="132" height="36" rx="18" fill="#F8FAFC"/>
</svg>
